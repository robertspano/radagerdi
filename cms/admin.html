<!doctype html>
<html lang="is">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ráðagerði · Admin</title>
<style>
  :root{--red:#FF3031;--green:#629F67;--ink:#1a1b1f}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;display:flex;align-items:center;justify-content:center;padding:24px;
    background:linear-gradient(180deg,#6ea873 0%,#5c9061 100%);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink)}
  .card{background:#fff;width:min(380px,100%);border-radius:24px;box-shadow:0 24px 60px rgba(30,50,35,.28);
    padding:44px 38px 34px;text-align:center}
  .logo{height:66px;width:auto;margin:0 auto 20px;display:block}
  .sub{color:#9aa0a4;font-size:12.5px;letter-spacing:.14em;text-transform:uppercase;margin:0 0 30px}
  form{display:flex;flex-direction:column;gap:12px}
  input{width:100%;border:1.5px solid #e4e7e9;border-radius:14px;padding:15px 16px;font-size:15px;outline:none;
    text-align:center;transition:.15s;background:#fafbfb}
  input::placeholder{color:#b6bbbf}
  input:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 4px rgba(98,159,103,.12)}
  button{width:100%;background:var(--green);color:#fff;border:none;border-radius:14px;padding:15px;
    font-size:15px;font-weight:700;cursor:pointer;transition:.15s;margin-top:4px}
  button:hover{background:#55915b}
  button:disabled{opacity:.55;cursor:default}
  .err{color:var(--red);font-size:13px;min-height:17px;font-weight:600}
</style>
</head>
<body>
  <form class="card" id="f">
    <img class="logo" src="/assets/6345d37b6a29219af60d57f4_Radagerdi-logo-1.svg" alt="Ráðagerði">
    <p class="sub">Efnisstjórnun</p>
    <input id="pw" type="password" autocomplete="current-password" placeholder="Lykilorð" autofocus>
    <button id="go" type="submit">Skrá inn</button>
    <div class="err" id="err"></div>
  </form>
<script>
  const params = new URLSearchParams(location.search);
  const next = params.get('next') || '/index.html?cms=1';
  fetch('/api/session').then(r=>r.json()).then(s=>{ if(s.authed) location.replace(next); });
  const f=document.getElementById('f'), err=document.getElementById('err'), go=document.getElementById('go');
  f.addEventListener('submit', async (e)=>{
    e.preventDefault(); err.textContent=''; go.disabled=true; go.textContent='Skrái inn…';
    try{
      const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:document.getElementById('pw').value})});
      const j=await r.json();
      if(j.ok){ location.replace(next); }
      else { err.textContent=j.error||'Rangt lykilorð'; go.disabled=false; go.textContent='Skrá inn'; }
    }catch(ex){ err.textContent='Villa við tengingu'; go.disabled=false; go.textContent='Skrá inn'; }
  });
</script>
</body>
</html>
