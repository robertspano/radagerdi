<!doctype html>
<html lang="is">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gjafabréf · Ráðagerði</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gjafabréf">
<link rel="apple-touch-icon" href="/assets/63bddf5d206bdd48525b5210_radagerdi-256x256-v2.png">
<link rel="icon" href="/assets/63bddf55571e7c33b03fb181_radagerdi-32x32 v2.png">
<script src="/cms/vendor/qrcode.js"></script>
<style>
  :root{--green:#629F67;--green-d:#4d7d52;--red:#FF3031;--ink:#1a1b1f;--cream:#f4f1ea}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--cream);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);
    display:flex;flex-direction:column;align-items:center;padding:22px 16px 40px}
  .wrap{width:min(420px,100%)}
  .card{background:linear-gradient(160deg,var(--green) 0%,var(--green-d) 100%);border-radius:24px;padding:26px 24px 22px;color:#fff;
    box-shadow:0 18px 44px rgba(40,70,45,.35);position:relative;overflow:hidden}
  .card::after{content:"";position:absolute;top:-70px;right:-70px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.07)}
  .card img.logo{height:26px;display:block;margin:0 auto 4px}
  .card .type{text-align:center;font-size:10.5px;letter-spacing:.28em;text-transform:uppercase;opacity:.85;margin:0 0 20px}
  .card .name{font-size:19px;font-weight:700;margin:0}
  .card .phone{font-size:12.5px;opacity:.75;margin:3px 0 16px}
  .card .lbl{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;opacity:.75}
  .card .bal{font-size:40px;font-weight:800;letter-spacing:-.01em;margin:2px 0 0}
  .card .empty{display:inline-block;margin-top:10px;background:rgba(0,0,0,.22);padding:6px 12px;border-radius:8px;font-size:12.5px;font-weight:600}
  .qrbox{background:#fff;border-radius:20px;margin-top:14px;padding:22px;text-align:center;box-shadow:0 10px 30px rgba(40,70,45,.12)}
  .qrbox .hint{font-size:12.5px;color:#8a8f96;margin:12px 0 0}
  .qrbox img{width:min(240px,70vw);height:auto;image-rendering:pixelated}
  .hist{background:#fff;border-radius:16px;margin-top:14px;padding:16px 18px;box-shadow:0 8px 24px rgba(40,70,45,.08)}
  .hist h3{margin:0 0 10px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#8a8f96}
  .hist .row{display:flex;justify-content:space-between;font-size:13.5px;padding:7px 0;border-bottom:1px solid #f0f0ec}
  .hist .row:last-child{border-bottom:none}
  .hist .neg{color:var(--red);font-weight:700}
  .hist .pos{color:var(--green);font-weight:700}
  .save{background:#fff;border-radius:16px;margin-top:14px;padding:16px 18px;box-shadow:0 8px 24px rgba(40,70,45,.08);font-size:13.5px;color:#555;line-height:1.55}
  .save b{color:var(--ink)}
  .err{text-align:center;margin-top:60px;color:#8a8f96}
  .foot{margin-top:22px;font-size:11.5px;color:#b3b0a8;text-align:center}
</style>
</head>
<body>
  <div class="wrap" id="app" hidden>
    <div class="card">
      <img class="logo" src="/assets/6353fbae1bb1a20968cdcc9f_logo-white.svg" alt="Ráðagerði">
      <p class="type">Gjafabréf</p>
      <p class="name" id="name"></p>
      <p class="phone" id="phone"></p>
      <div class="lbl">Inneign</div>
      <div class="bal" id="bal"></div>
      <div class="empty" id="empty" hidden>Innistæða uppurin</div>
    </div>
    <div class="qrbox">
      <div id="qr"></div>
      <p class="hint">Sýndu þennan kóða á staðnum — starfsfólk skannar hann við greiðslu</p>
    </div>
    <div class="hist" id="hist" hidden>
      <h3>Hreyfingar</h3>
      <div id="histrows"></div>
    </div>
    <div class="save" id="save"></div>
    <div class="foot">Ráðagerði Veitingahús · Seltjarnarnesi · 546 1700</div>
  </div>
  <div class="err" id="notfound" hidden>
    <h2>Gjafabréf fannst ekki</h2>
    <p>Athugaðu hvort hlekkurinn sé réttur.</p>
  </div>
<script>
  const id = location.pathname.split('/').pop();
  const kr = n => new Intl.NumberFormat('is-IS').format(n) + ' kr.';
  const dt = s => { const d = new Date(s); return d.getDate() + '.' + (d.getMonth() + 1) + '.' + d.getFullYear(); };

  function renderQR() {
    const qr = qrcode(0, 'M');
    qr.addData(location.origin + '/gjafabref/' + id);
    qr.make();
    document.getElementById('qr').innerHTML = qr.createImgTag(6, 4);
  }
  function renderSaveHint() {
    const ios = /iphone|ipad|ipod/i.test(navigator.userAgent);
    document.getElementById('save').innerHTML = ios
      ? '💡 <b>Vistaðu gjafabréfið:</b> ýttu á <b>Deila</b>-hnappinn (ferningur með ör) og veldu <b>„Bæta við heimaskjá“</b> — þá er kortið alltaf við höndina eins og í veski.'
      : '💡 <b>Vistaðu gjafabréfið:</b> opnaðu valmynd vafrans (⋮) og veldu <b>„Bæta við heimaskjá“</b> — þá er kortið alltaf við höndina eins og í veski.';
  }
  async function load() {
    let r;
    try { r = await fetch('/api/giftcards/' + id, { cache: 'no-store' }); } catch (e) { }
    if (!r || !r.ok) { document.getElementById('notfound').hidden = false; return; }
    const { card } = await r.json();
    document.getElementById('app').hidden = false;
    document.getElementById('name').textContent = card.name;
    document.getElementById('phone').textContent = card.phone || '';
    document.getElementById('bal').textContent = kr(card.balance);
    document.getElementById('empty').hidden = card.balance > 0;
    const hist = (card.history || []).slice().reverse().slice(0, 8);
    if (hist.length) {
      document.getElementById('hist').hidden = false;
      document.getElementById('histrows').innerHTML = hist.map(h =>
        '<div class="row"><span>' + dt(h.ts) + (h.type === 'create' ? ' · Stofnað' : ' · Notað') + '</span>' +
        '<span class="' + (h.type === 'create' ? 'pos' : 'neg') + '">' + (h.type === 'create' ? '+' : '−') + kr(h.amount) + '</span></div>'
      ).join('');
    }
  }
  renderQR(); renderSaveHint(); load();
  // refresh the balance whenever the customer re-opens the card (e.g. right after staff scanned it)
  document.addEventListener('visibilitychange', () => { if (!document.hidden) load(); });
  window.addEventListener('focus', load);
</script>
</body>
</html>
